<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyEvent-Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body style="background-color:rgb(242, 246, 250);">
    <main class="d-flex justify-content-center align-items-center ">
        <div class="container-lg h-75 m-5 border border-2 shadow rounded-4 bg-white">
            <div class="row">

                <div class="col-md-6 p-0">
                    <img src="https://i.pinimg.com/736x/f4/23/38/f42338b4b805cd7ecb965c75c92519b2.jpg" alt=""
                        height="600px" class="w-100 rounded-end-pill rounded-start-4">
                </div>

                <div class="col-md-5 mx-5 d-flex flex-column gap-1 justify-content-center">
                    <h1 class="fw-bold display-5">Welcome Back!</h1>
                    <p class="lead">Please enter your details to sign in</p>
                    <form action="">
                        <label for="email" class="d-block fs-5 fw-bold">Email Address</label>
                        <input type="email" placeholder="xyz@gmail.com" id="email"
                            class="fs-5 w-100 mb-4 rounded-2 border border-danger border-2 p-2 border-secondary shadow-sm">
                        <br>
                        <div class="d-flex justify-content-between">
                            <label for="password" class="d-block fs-5 fw-bold">Password</label>
                            <span class="fs-6 fw-bold text-danger">Forgot Password?</span>
                        </div>
                        <input type="password" name="password" id="password" placeholder="**********"
                            class="fs-5 w-100 mb-4 rounded-2 border p-2 border-secondary ">
                        <br>
                        <input type="checkbox" name="" id="" class="me-1">
                        <span class="lead fs-5">Remember me for 30 days</span>
                        <button class="btn w-100 bg-danger text-white fw-bolder fs-5 my-3 shadow rounded-3"><a
                                href="Profile.html" class="text-decoration-none text-white">Login</a></button>
                        <div class="d-flex align-items-center text-center my-4">
                            <div class="border-top flex-grow-1"></div>
                            <span class="mx-2 text-muted">OR</span>
                            <div class="border-top flex-grow-1"></div>
                        </div>
                        <div class="d-flex gap-4">
                            <button class="btn shadow-sm border w-50 d-flex justify-content-center align-items-center">
                                <img src="https://i.pinimg.com/1200x/45/20/dd/4520ddfc56208707045c56232e946f7f.jpg"
                                    alt="" height="30px">
                                <span class=" text-secondary fs-5 mx-2">Google</span>
                            </button>
                            <button class="btn shadow-sm border w-50 d-flex justify-content-center align-items-center">
                                <img src="https://i.pinimg.com/736x/ab/96/4b/ab964bcf79cbc2d86b15a9e2efe05ffa.jpg"
                                    alt="" height="30px">
                                <span class=" text-secondary fs-5 mx-2">Facebook</span>
                            </button>
                        </div>
                        <div class="d-flex justify-content-center my-4">
                            <p class="lead fs-5">Don't hav an account?</p>
                            <span class="fw-bold fs-5 mx-2 text-danger">Sign Up</span>
                        </div>


                    </form>
                </div>
            </div>
        </div>
    </main>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>
